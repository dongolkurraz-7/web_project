<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>خريطة القلاع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     لوحة الألوان والخطوط — غيّر القيم هون وكل العناصر بتتحدث تلقائياً
     ============================================================ */
  :root{
    --bg:#0a0e17;
    --grid-line: rgba(120,150,210,0.10);
    --panel-bg: #11182a;
    --panel-border: rgba(255,255,255,0.08);
    --text: #e8edf5;
    --text-dim: #8a93a8;
    --accent: #5b8cff;

    /* الألوان الجاهزة لاختيار لون القلعة من اللوحة */
    --c1:#27e0d6; --c2:#ff3d7f; --c3:#ffcf4d; --c4:#7c5bff; --c5:#4cd964; --c6:#ff7a3d;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:'Tajawal', sans-serif; overflow:hidden; touch-action:none; }
  h1,h2,h3,.brand,.castle-label{ font-family:'Rajdhani','Tajawal', sans-serif; }

  /* ===================== الشريط العلوي ===================== */
  #topbar{
    position:fixed; inset:0 0 auto 0; height:54px; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 14px; background:linear-gradient(180deg, rgba(10,14,23,0.95), rgba(10,14,23,0.0));
    pointer-events:none;
  }
  #topbar .brand{ font-weight:700; font-size:18px; letter-spacing:1px; color:var(--text); pointer-events:auto; }
  #topbar .brand span{ color:var(--accent); }
  #topbar .actions{ display:flex; gap:8px; pointer-events:auto; }
  .pill-btn{
    background:var(--panel-bg); border:1px solid var(--panel-border); color:var(--text);
    border-radius:999px; padding:9px 16px; font-size:13px; font-family:'Tajawal';
    display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none;
  }
  .pill-btn:active{ transform:scale(0.96); }
  .pill-btn.primary{ background:var(--accent); border-color:var(--accent); color:#06101f; font-weight:700; }

  /* ===================== منطقة الخريطة ===================== */
  #viewport{
    position:absolute; inset:0; overflow:hidden; cursor:grab;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 46px 46px;
  }
  #viewport.panning{ cursor:grabbing; }
  #world{
    position:absolute; left:0; top:0; width:0; height:0;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* ===================== القلعة ===================== */
  .castle{
    position:absolute; transform:translate(-50%,-100%);
    display:flex; flex-direction:column; align-items:center;
    cursor:pointer; user-select:none; touch-action:none;
  }
  .castle-label{
    margin-bottom:6px; padding:3px 10px; border-radius:8px; font-size:12px; font-weight:600;
    background:rgba(10,14,23,0.85); white-space:nowrap; backdrop-filter:blur(2px);
    border:1px solid var(--c); color:var(--text);
  }
  .castle-art{ position:relative; width:70px; height:70px; }

  /* القاعدة البيضاوية المضيئة تحت القلعة */
  .castle-base{
    position:absolute; left:50%; bottom:4px; transform:translateX(-50%);
    width:54px; height:18px; border-radius:50%;
    border:2px solid var(--c); box-shadow:0 0 16px var(--c), inset 0 0 10px var(--c);
    opacity:0.55;
  }

  /* جسم القلعة (البرج) */
  .castle-body{
    position:absolute; left:50%; bottom:10px; transform:translateX(-50%);
    width:26px; height:34px; background:linear-gradient(180deg,#161e30,#0c1220);
    border:2px solid var(--c); border-radius:3px; box-shadow:0 0 10px var(--c);
  }

  /* أشكال السقف المختلفة — هاد هو "شكل القلعة" */
  .roof{ position:absolute; left:50%; transform:translateX(-50%); }

  .shape-pyramid .castle-body{ height:30px; }
  .shape-pyramid .roof{
    bottom:38px; width:0; height:0;
    border-left:15px solid transparent; border-right:15px solid transparent;
    border-bottom:24px solid var(--c); filter:drop-shadow(0 0 8px var(--c));
  }

  .shape-spire .castle-body{ width:18px; height:40px; }
  .shape-spire .roof{
    bottom:48px; width:0; height:0;
    border-left:9px solid transparent; border-right:9px solid transparent;
    border-bottom:26px solid var(--c); filter:drop-shadow(0 0 8px var(--c));
  }

  .shape-fortress .castle-body{ width:36px; height:26px; }
  .shape-fortress .roof{
    bottom:34px; width:36px; height:10px; background:var(--c); box-shadow:0 0 8px var(--c);
    clip-path: polygon(0 100%, 0 0, 15% 0, 15% 40%, 30% 40%, 30% 0, 45% 0, 45% 40%, 55% 40%, 55% 0, 70% 0, 70% 40%, 85% 40%, 85% 0, 100% 0, 100% 100%);
  }

  .castle.selected .castle-body{ box-shadow:0 0 0 2px #fff, 0 0 14px var(--c); }

  /* زر إضافة سريع داخل الخريطة لمكان معيّن (يظهر عند الضغط المطوّل) */
  .ghost{ opacity:0.5; }

  /* ===================== لوحة تعديل القلعة ===================== */
  #editPanel{
    position:fixed; left:50%; bottom:0; transform:translate(-50%, 100%);
    width:min(420px, calc(100% - 28px)); max-height:70vh; overflow:auto;
    background:var(--panel-bg); border:1px solid var(--panel-border);
    border-radius:16px 16px 0 0; padding:18px 18px 22px; z-index:30;
    transition:transform 0.25s ease; box-shadow:0 -10px 30px rgba(0,0,0,0.4);
  }
  #editPanel.open{ transform:translate(-50%, 0); }
  #editPanel h3{ margin:0 0 14px; font-size:17px; display:flex; justify-content:space-between; align-items:center; }
  #editPanel .close-x{ cursor:pointer; color:var(--text-dim); font-size:20px; line-height:1; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; }
  .field input[type=text]{
    width:100%; background:#0c1220; border:1px solid var(--panel-border); border-radius:10px;
    padding:10px 12px; color:var(--text); font-family:'Tajawal'; font-size:14px;
  }
  .swatches{ display:flex; gap:8px; flex-wrap:wrap; }
  .swatch{
    width:30px; height:30px; border-radius:50%; cursor:pointer; border:2px solid transparent;
  }
  .swatch.active{ border-color:#fff; }
  .shapes-row{ display:flex; gap:10px; }
  .shape-opt{
    flex:1; padding:10px 6px; text-align:center; border-radius:10px; cursor:pointer;
    background:#0c1220; border:1px solid var(--panel-border); font-size:12px; color:var(--text-dim);
  }
  .shape-opt.active{ border-color:var(--accent); color:var(--text); }
  .edit-actions{ display:flex; gap:10px; margin-top:6px; }
  .btn-block{
    flex:1; text-align:center; padding:11px; border-radius:10px; cursor:pointer; font-weight:600; font-size:14px;
  }
  .btn-save{ background:var(--accent); color:#06101f; }
  .btn-delete{ background:rgba(255,61,127,0.12); color:#ff3d7f; border:1px solid rgba(255,61,127,0.4); }

  #overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:25; opacity:0; pointer-events:none;
    transition:opacity 0.25s ease;
  }
  #overlay.show{ opacity:1; pointer-events:auto; }

  /* ===================== أزرار التحكم بالتكبير ===================== */
  #zoomControls{
    position:fixed; left:14px; bottom:18px; z-index:20;
    display:flex; flex-direction:column; gap:8px;
  }
  .zoom-btn{
    width:42px; height:42px; border-radius:50%; background:var(--panel-bg);
    border:1px solid var(--panel-border); color:var(--text); font-size:20px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
</style>
</head>
<body>

  <div id="topbar">
    <div class="brand">خريطة <span>القلاع</span></div>
    <div class="actions">
      <div class="pill-btn primary" id="addCastleBtn">+ إضافة قلعة</div>
    </div>
  </div>

  <div id="viewport">
    <div id="world"></div>
  </div>

  <div id="zoomControls">
    <div class="zoom-btn" id="zoomIn">+</div>
    <div class="zoom-btn" id="zoomOut">−</div>
  </div>

  <div id="overlay"></div>
  <div id="editPanel">
    <h3>
      <span id="editTitle">تعديل القلعة</span>
      <span class="close-x" id="closeEdit">✕</span>
    </h3>

    <div class="field">
      <label>اسم القلعة</label>
      <input type="text" id="nameInput" placeholder="مثال: إنستقرام">
    </div>

    <div class="field">
      <label>اللون</label>
      <div class="swatches" id="colorSwatches"></div>
    </div>

    <div class="field">
      <label>شكل القلعة</label>
      <div class="shapes-row" id="shapeOptions">
        <div class="shape-opt" data-shape="shape-pyramid">برج مدبب</div>
        <div class="shape-opt" data-shape="shape-spire">صومعة رفيعة</div>
        <div class="shape-opt" data-shape="shape-fortress">حصن عريض</div>
      </div>
    </div>

    <div class="edit-actions">
      <div class="btn-block btn-delete" id="deleteBtn">حذف القلعة</div>
      <div class="btn-block btn-save" id="saveBtn">حفظ</div>
    </div>
  </div>

<script>
/* ============================================================
   بيانات القلاع — هاد المصفوفة هي "قاعدة البيانات" البسيطة.
   كل قلعة = { id, name, x, y, color, shape }
   x, y هنّ موقع القلعة داخل عالم الخريطة (بوحدات px غير متأثرة بالتكبير).
   لإضافة قلاع ابتدائية بنفسك، زيد عناصر هون مباشرة.
   ============================================================ */
let castles = [
  { id: 1, name: 'إنستقرام',  x: 420, y: 260, color: '#27e0d6', shape: 'shape-pyramid' },
  { id: 2, name: 'تيك توك',   x: 620, y: 360, color: '#ff3d7f', shape: 'shape-spire'   },
  { id: 3, name: 'يوتيوب',    x: 300, y: 460, color: '#ffcf4d', shape: 'shape-fortress'},
];
let nextId = 4;

const palette = ['#27e0d6','#ff3d7f','#ffcf4d','#7c5bff','#4cd964','#ff7a3d'];

/* ===================== حالة الخريطة (تكبير/سحب) ===================== */
const world = document.getElementById('world');
const viewport = document.getElementById('viewport');
let panX = 220, panY = 80, zoom = 1;

function applyWorldTransform(){
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
}

/* ===================== رسم القلاع ===================== */
function render(){
  world.innerHTML = '';
  castles.forEach(c => {
    const el = document.createElement('div');
    el.className = 'castle ' + c.shape;
    el.style.left = c.x + 'px';
    el.style.top = c.y + 'px';
    el.style.setProperty('--c', c.color);
    el.dataset.id = c.id;
    el.innerHTML = `
      <div class="castle-label" style="--c:${c.color}">${escapeHtml(c.name)}</div>
      <div class="castle-art">
        <div class="roof"></div>
        <div class="castle-body"></div>
        <div class="castle-base"></div>
      </div>
    `;
    attachDrag(el, c);
    world.appendChild(el);
  });
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ===================== سحب القلعة بحرية ===================== */
function attachDrag(el, castle){
  let dragging = false, moved = false, startScreenX, startScreenY, startX, startY;

  el.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    dragging = true; moved = false;
    startScreenX = e.clientX; startScreenY = e.clientY;
    startX = castle.x; startY = castle.y;
    el.setPointerCapture(e.pointerId);
  });

  el.addEventListener('pointermove', (e) => {
    if(!dragging) return;
    const dx = (e.clientX - startScreenX) / zoom;
    const dy = (e.clientY - startScreenY) / zoom;
    if(Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
    castle.x = startX + dx;
    castle.y = startY + dy;
    el.style.left = castle.x + 'px';
    el.style.top = castle.y + 'px';
  });

  el.addEventListener('pointerup', (e) => {
    dragging = false;
    if(!moved) openEdit(castle); // ضغطة بدون تحريك = فتح التعديل
  });
}

/* ===================== سحب الخريطة (Pan) ===================== */
let panning = false, panStartX, panStartY, panOrigX, panOrigY;

viewport.addEventListener('pointerdown', (e) => {
  panning = true; viewport.classList.add('panning');
  panStartX = e.clientX; panStartY = e.clientY;
  panOrigX = panX; panOrigY = panY;
});
viewport.addEventListener('pointermove', (e) => {
  if(!panning) return;
  panX = panOrigX + (e.clientX - panStartX);
  panY = panOrigY + (e.clientY - panStartY);
  applyWorldTransform();
});
['pointerup','pointerleave'].forEach(ev =>
  viewport.addEventListener(ev, () => { panning = false; viewport.classList.remove('panning'); })
);

/* ===================== التكبير/التصغير ===================== */
document.getElementById('zoomIn').onclick = () => { zoom = Math.min(zoom + 0.15, 2.2); applyWorldTransform(); };
document.getElementById('zoomOut').onclick = () => { zoom = Math.max(zoom - 0.15, 0.4); applyWorldTransform(); };
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  zoom = Math.min(2.2, Math.max(0.4, zoom - e.deltaY * 0.001));
  applyWorldTransform();
}, { passive:false });

/* ===================== إضافة قلعة جديدة ===================== */
document.getElementById('addCastleBtn').onclick = () => {
  const c = {
    id: nextId++,
    name: 'قلعة جديدة',
    x: (-panX + viewport.clientWidth/2) / zoom,
    y: (-panY + viewport.clientHeight/2) / zoom,
    color: palette[Math.floor(Math.random()*palette.length)],
    shape: 'shape-pyramid'
  };
  castles.push(c);
  render();
  openEdit(c);
};

/* ===================== لوحة التعديل ===================== */
const editPanel = document.getElementById('editPanel');
const overlay = document.getElementById('overlay');
const nameInput = document.getElementById('nameInput');
const colorSwatches = document.getElementById('colorSwatches');
const shapeOptions = document.getElementById('shapeOptions');
let editingCastle = null;

palette.forEach(col => {
  const sw = document.createElement('div');
  sw.className = 'swatch'; sw.style.background = col; sw.dataset.color = col;
  sw.onclick = () => {
    [...colorSwatches.children].forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
  };
  colorSwatches.appendChild(sw);
});

[...shapeOptions.children].forEach(opt => {
  opt.onclick = () => {
    [...shapeOptions.children].forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
  };
});

function openEdit(castle){
  editingCastle = castle;
  nameInput.value = castle.name;
  [...colorSwatches.children].forEach(s => s.classList.toggle('active', s.dataset.color === castle.color));
  [...shapeOptions.children].forEach(o => o.classList.toggle('active', o.dataset.shape === castle.shape));
  editPanel.classList.add('open');
  overlay.classList.add('show');
}
function closeEdit(){
  editPanel.classList.remove('open');
  overlay.classList.remove('show');
  editingCastle = null;
}
document.getElementById('closeEdit').onclick = closeEdit;
overlay.onclick = closeEdit;

document.getElementById('saveBtn').onclick = () => {
  if(!editingCastle) return;
  editingCastle.name = nameInput.value.trim() || 'قلعة';
  const activeColor = colorSwatches.querySelector('.active');
  const activeShape = shapeOptions.querySelector('.active');
  if(activeColor) editingCastle.color = activeColor.dataset.color;
  if(activeShape) editingCastle.shape = activeShape.dataset.shape;
  render();
  closeEdit();
};

document.getElementById('deleteBtn').onclick = () => {
  if(!editingCastle) return;
  castles = castles.filter(c => c.id !== editingCastle.id);
  render();
  closeEdit();
};

/* ===================== البداية ===================== */
applyWorldTransform();
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCraft AI - Castle Theme</title>
    <!-- استدعاء خطوط تناسب الألعاب والعصور الوسطى -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- حاوية القلعة الرئيسية -->
    <div class="castle-container">
        
        <!-- رأس القلعة (الشرفة العلوية) -->
        <div class="castle-crenellations">
            <div class="merlon"></div>
            <div class="merlon"></div>
            <div class="merlon"></div>
            <div class="merlon"></div>
        </div>

        <!-- اللوحة الداخلية المحصنة -->
        <div class="castle-panel">
            <h1 class="castle-title">مَحْكَمَة القَلْعَة الذَّكِيَّة</h1>
            <p class="castle-desc">مرحباً بك في نظام التحكم الذكي لـ WebCraft AI. من هنا يمكنك إدارة بوابات التعليمات البرمجية وتوجيه الذكاء الاصطناعي.</p>
            
            <!-- أزرار التحكم بالتأثير الناري -->
            <div class="castle-actions">
                <button class="castle-btn btn-torch" onclick="toggleGate()">
                    <span class="btn-icon">🏰</span>
                    <span class="btn-text">رفع البوابة الحديدية</span>
                </button>
                <button class="castle-btn btn-torch">
                    <span class="btn-icon">⚔️</span>
                    <span class="btn-text">شحذ الأكواد (تحسين)</span>
                </button>
            </div>

            <!-- بوابة القلعة المتحركة (Animate Gate) -->
            <div class="castle-gate" id="castleGate">
                <div class="gate-grid"></div>
                <p class="gate-status">البوابة مغلقة ومحصنة</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>

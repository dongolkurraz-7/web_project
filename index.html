<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الممالك - تحديث التجربة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Tajawal', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            /* منع التحديد والزوم */
            touch-action: none; 
            user-select: none;
        }

        body { background-color: #05070f; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ================= ساحة الخريطة ================= */
        .map-viewport { flex: 1; width: 100%; position: relative; overflow: hidden; background: radial-gradient(circle at center, #111827 0%, #05070f 100%); }

        .isometric-scene { 
            width: 100%; height: 100%; position: relative; 
            transform: rotateX(55deg) rotateZ(-45deg) scale(0.6); 
            transform-style: preserve-3d;
        }
        
        /* القلاع مع تأثيرات تجربة المستخدم */
        .castle-node { 
            position: absolute; width: 90px; height: 90px; 
            transform-style: preserve-3d; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
            will-change: transform;
        }
        
        /* تأثير عند المسك */
        .castle-node.dragging { 
            transform: scale3d(1.2, 1.2, 1.2) translateZ(20px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            z-index: 1000 !important;
        }

        .castle-neon-grid {
            position: absolute; width: 100%; height: 100%; border: 2.5px solid var(--accent-color);
            border-radius: 14px; background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .castle-3d-structure { 
            position: absolute; width: 45px; height: 45px; top: 22px; left: 22px; 
            transform: rotateZ(45deg) rotateX(-55deg) translateY(-22px); 
            pointer-events: none; 
        }
        .main-tower { position: absolute; width: 38px; height: 68px; background: linear-gradient(135deg, #64748b, #334155); border-radius: 4px; }
        .castle-roof-top { position: absolute; top: -30px; left: -3px; width: 42px; height: 30px; background: var(--accent-color); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

        .platform-badge {
            position: absolute; top: -85px; left: 50%; transform: translateX(-50%) rotateZ(45deg) rotateX(-55deg);
            background: rgba(0,0,0,0.8); border: 1px solid var(--accent-color); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold;
        }

        /* توزيع القلاع */
        .c-youtube { --accent-color: #ef4444; top: 10%; left: 15%; }
        .c-tiktok { --accent-color: #06b6d4; top: 10%; left: 60%; }
        .c-insta { --accent-color: #ec4899; top: 38%; left: 12%; }
        .c-snap { --accent-color: #eab308; top: 38%; left: 45%; }
        .c-facebook { --accent-color: #3b82f6; top: 38%; left: 78%; }
        .c-linkedin { --accent-color: #0284c7; top: 70%; left: 20%; }
        .c-upwork { --accent-color: #22c55e; top: 70%; left: 60%; }

        /* اللوحة السفلية */
        .bottom-panel { height: 28%; background: #0a0f1e; border-top: 2px solid #1e293b; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .treasury-row { background: #111827; padding: 8px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="map-viewport" id="viewport">
        <div class="isometric-scene" id="scene">
            <!-- القلاع السبع -->
            <div class="castle-node c-youtube" data-id="youtube"><div class="platform-badge"><i class="fab fa-youtube"></i> يوتيوب</div><div class="castle-neon-grid"></div><div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div></div>
            <div class="castle-node c-tiktok" data-id="tiktok"><div class="platform-badge"><i class="fab fa-tiktok"></i> تيك توك</div><div class="castle-neon-grid"></div><div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div></div>
            <div class="castle-node c-insta" data-id="insta"><div class="platform-badge"><i class="fab fa-instagram"></i> انستغرام</div><div class="castle-neon-grid"></div><div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div></div>
            <div class="castle-node c-snap" data-id="snap"><div class="platform-badge"><i class="fab fa-snapchat"></i> سناب</div><div class="castle-neon-grid"></div><div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div></div>
            <div class="castle-node c-facebook" data-id="facebook"><div class="platform-badge"><i class="fab fa-facebook-f"></i> فيسبوك</div><div class="castle-neon-grid"></div><div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div></div>
            <div class="castle-node c-linkedin" data-id="linkedin"><div class="platform-badge"><i class="fab fa-linkedin-in"></i> لينكد إن</div><div class="castle-neon-grid"></div><div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div></div>
            <div class="castle-node c-upwork" data-id="upwork"><div class="platform-badge"><i class="fas fa-briefcase"></i> أب ورك</div><div class="castle-neon-grid"></div><div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div></div>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="treasury-row"><span>الرصيد المتاح</span><span style="color:#6fda44;">$5,680.00</span></div>
    </div>

    <script>
        const nodes = document.querySelectorAll('.castle-node');
        nodes.forEach(node => {
            let active = false;
            let initialX, initialY, xOffset = 0, yOffset = 0;

            const start = (e) => {
                active = true;
                node.classList.add('dragging');
                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                initialX = clientX - (node.offsetLeft);
                initialY = clientY - (node.offsetTop);
            };

            const move = (e) => {
                if (!active) return;
                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                node.style.left = (clientX - initialX) + 'px';
                node.style.top = (clientY - initialY) + 'px';
            };

            const end = () => {
                active = false;
                node.classList.remove('dragging');
            };

            node.addEventListener('touchstart', start);
            window.addEventListener('touchmove', move);
            window.addEventListener('touchend', end);
            node.addEventListener('mousedown', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
        });
    </script>
</body>
</html>

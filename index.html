<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الممالك السحابية - التطوير الشامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: #05070f; color: #fff; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; position: relative; 
        }

        /* ================= ساحة الخريطة ثلاثية الأبعاد ================= */
        .map-viewport {
            flex: 1; width: 100%; background-color: #0b0f19; position: relative;
            background-image: linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 40px 40px; overflow: hidden;
        }

        .isometric-scene { 
            width: 100%; height: 100%; position: relative; 
            transform: rotateX(55deg) rotateZ(-45deg) scale(0.6); 
            transform-style: preserve-3d; transition: transform 0.3s ease;
        }
        
        /* تصميم وعناصر القلاع المتطورة */
        .castle-node { 
            position: absolute; width: 90px; height: 90px; transform-style: preserve-3d; 
            cursor: grab; touch-action: none; z-index: 10;
        }
        .castle-node:active { cursor: grabbing; transform: scale3d(1.05, 1.05, 1.05); }

        .castle-neon-grid {
            position: absolute; width: 100%; height: 100%; border: 2.5px solid var(--accent-color);
            border-radius: 14px; background: linear-gradient(135deg, #1e293b, #0f172a);
            box-shadow: 0 0 15px var(--accent-color), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .castle-3d-structure { 
            position: absolute; width: 45px; height: 45px; top: 22px; left: 22px; 
            transform: rotateZ(45deg) rotateX(-55deg) translateY(-22px); 
            transform-style: preserve-3d; pointer-events: none; 
        }
        .main-tower { position: absolute; width: 38px; height: 68px; background: linear-gradient(135deg, #64748b, #334155); border: 2px solid #1e293b; border-radius: 4px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .castle-roof-top { position: absolute; top: -30px; left: -3px; width: 42px; height: 30px; background: radial-gradient(circle at 30% 30%, var(--accent-color), #2d050e); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

        .platform-badge {
            position: absolute; top: -85px; left: 50%; transform: translateX(-50%) rotateZ(45deg) rotateX(-55deg);
            background: rgba(9, 13, 22, 0.9); border: 1.5px solid var(--accent-color); padding: 4px 12px; border-radius: 20px; white-space: nowrap; pointer-events: none; backdrop-filter: blur(4px); box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .platform-badge span { font-size: 0.75rem; font-weight: 700; color: #fff; margin-right: 5px; }

        /* التوزيع التناسقي الذكي المبدئي للقلاع السبع */
        .c-youtube   { --accent-color: #ef4444; top: 10%; left: 15%; }
        .c-tiktok    { --accent-color: #06b6d4; top: 10%; left: 60%; }
        .c-insta     { --accent-color: #ec4899; top: 38%; left: 12%; }
        .c-snap      { --accent-color: #eab308; top: 38%; left: 45%; }
        .c-facebook  { --accent-color: #3b82f6; top: 38%; left: 78%; }
        .c-linkedin  { --accent-color: #0284c7; top: 70%; left: 20%; }
        .c-upwork    { --accent-color: #22c55e; top: 70%; left: 60%; }

        /* زر طلب سحب آمن الطافي فوق اللوحة */
        .withdraw-btn-container {
            position: absolute; bottom: 40%; left: 20px; z-index: 100;
        }
        .withdraw-btn {
            background: linear-gradient(135deg, #8b0000, #b22222); color: white;
            border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold;
            font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(178,34,34,0.4); transition: transform 0.2s;
        }
        .withdraw-btn:active { transform: scale(0.95); }

        /* ================= لوحة التحكم السفلية الكاملة المتناسقة ================= */
        .bottom-panel {
            width: 100%; height: 38%; background: #0a0f1e; border-top: 2px solid #1e293b;
            padding: 12px; display: flex; flex-direction: column; gap: 8px; z-index: 50;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5); overflow-y: auto;
        }

        .panel-header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; padding-bottom: 6px; }
        .sidebar-title { font-size: 0.85rem; font-weight: 900; color: #ffb800; display: flex; align-items: center; gap: 6px; }
        
        .stats-container { display: flex; flex-direction: column; gap: 6px; margin: 4px 0; }
        .treasury-row { background: #111827; border: 1px solid #1e293b; padding: 8px 14px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold; }

        .ai-chat-box { flex: 1; background: #090d16; border: 1px solid #312e81; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; min-height: 110px; }
        .chat-messages { flex: 1; overflow-y: auto; padding-bottom: 5px; }
        .msg { font-size: 0.75rem; line-height: 1.4; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; }
        .msg.ai { background: #1e1b4b; border-right: 3px solid #6366f1; color: #cbd5e1; }
        .msg.user { background: #1e293b; border-left: 3px solid #ffb800; text-align: left; }

        .chat-input-area { display: flex; gap: 6px; }
        .chat-input-area input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #fff; padding: 0 10px; font-size: 0.8rem; outline: none; }
        .chat-input-area button { width: 40px; background: #4338ca; border: none; border-radius: 6px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }

        /* الشاشات الكبيرة (الكمبيوتر المكتبي) */
        @media (min-width: 769px) {
            body { flex-direction: row; }
            .map-viewport { height: 100%; flex: 1; }
            .withdraw-btn-container { bottom: 20px; left: auto; right: 340px; }
            .bottom-panel { width: 320px; height: 100%; border-top: none; border-right: 2px solid #1e293b; }
            .isometric-scene { transform: rotateX(55deg) rotateZ(-45deg) scale(0.75); }
        }
    </style>
</head>
<body>

                <div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div>

            <div class="castle-node c-facebook" data-id="facebook">

                <div class="castle-neon-grid"></div>
                <div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div>

            <div class="castle-node c-linkedin" data-id="linkedin">
                <div class="platform-badge"><i class="fab fa-linkedin-in" style="color:#0284c7;"></i><span>لينكد إن</span></div>

                <div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div>
            </div>
            <div class="castle-node c-upwork" data-id="upwork">
                <div class="platform-badge"><i class="fas fa-briefcase" style="color:#22c55e;"></i><span>أب ورك</span></div>
                <div class="castle-neon-grid"></div>
                <div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div>
            </div>
        </div>
    </div>

    <div class="withdraw-btn-container">
        <button class="withdraw-btn" onclick="alert('جاري إعداد طلب سحب آمن للإيرادات...')">
            <i class="fas fa-shield-alt"></i> طلب سحب آمن
        </button>
    </div>

    <div class="bottom-panel">
        <div class="panel-header-row">
            <div class="sidebar-title"><i class="fas fa-wallet"></i> إحصائيات الخزينة والعملة</div>

        <div class="stats-container">

            <div class="treasury-row"><span>العوائد المعلقة</span><span style="color:#ffb800;">$1,420.00</span></div>
        </div>
        
        <div class="ai-chat-box">

                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية الممالك المطورة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght500;700;900&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: #05070f; color: #fff; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; position: relative; 
        }

        /* ================= منطقة الخريطة ثلاثية الأبعاد ================= */
        .map-viewport {
            flex: 1; width: 100%; background-color: #0b0f19; position: relative;
            background-image: linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 40px 40px; overflow: hidden;
        }

        .isometric-scene { 
            width: 100%; height: 100%; position: relative; 
            transform: rotateX(55deg) rotateZ(-45deg) scale(0.6); 
            transform-style: preserve-3d; transition: transform 0.3s ease;
        }
        
        /* قوالب القلاع المتطورة */
        .castle-node { 
            position: absolute; width: 90px; height: 90px; transform-style: preserve-3d; 
            cursor: grab; touch-action: none; z-index: 10;
        }
        .castle-node:active { cursor: grabbing; transform: scale3d(1.05, 1.05, 1.05); }

        .castle-neon-grid {
            position: absolute; width: 100%; height: 100%; border: 2.5px solid var(--accent-color);
            border-radius: 14px; background: linear-gradient(135deg, #1e293b, #0f172a);
            box-shadow: 0 0 15px var(--accent-color), inset 0 0 10px rgba(0,0,0,0.5);
        }

        .castle-3d-structure { 
            position: absolute; width: 45px; height: 45px; top: 22px; left: 22px; 
            transform: rotateZ(45deg) rotateX(-55deg) translateY(-22px); 
            transform-style: preserve-3d; pointer-events: none; 
        }
        .main-tower { position: absolute; width: 38px; height: 68px; background: linear-gradient(135deg, #64748b, #334155); border: 2px solid #1e293b; border-radius: 4px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .castle-roof-top { position: absolute; top: -30px; left: -3px; width: 42px; height: 30px; background: radial-gradient(circle at 30% 30%, var(--accent-color), #2d050e); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }

        .platform-badge {
            position: absolute; top: -85px; left: 50%; transform: translateX(-50%) rotateZ(45deg) rotateX(-55deg);
            background: rgba(9, 13, 22, 0.9); border: 1.5px solid var(--accent-color); padding: 4px 12px; border-radius: 20px; white-space: nowrap; pointer-events: none; backdrop-filter: blur(4px); box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .platform-badge span { font-size: 0.75rem; font-weight: 700; color: #fff; margin-right: 5px; }

        /* التوزيع التناسقي الذكي المبدئي للقلاع السبع */
        .c-youtube   { --accent-color: #ef4444; top: 10%; left: 15%; }
        .c-tiktok    { --accent-color: #06b6d4; top: 10%; left: 60%; }
        .c-insta     { --accent-color: #ec4899; top: 38%; left: 12%; }
        .c-snap      { --accent-color: #eab308; top: 38%; left: 45%; }
        .c-facebook  { --accent-color: #3b82f6; top: 38%; left: 78%; }
        .c-linkedin  { --accent-color: #0284c7; top: 70%; left: 20%; }
        .c-upwork    { --accent-color: #22c55e; top: 70%; left: 60%; }

        /* ================= لوحة التحكم السفلية المحسنة ================= */
        .bottom-panel {
            width: 100%; height: 38%; background: #0a0f1e; border-top: 2px solid #1e293b;
            padding: 12px; display: flex; flex-direction: column; gap: 8px; z-index: 50;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        .panel-header-row { display: flex; justify-content: space-between; align-items: center; }
        .sidebar-title { font-size: 0.85rem; font-weight: 900; color: #ffb800; display: flex; align-items: center; gap: 6px; }
        .treasury-row { background: #111827; border: 1px solid #1e293b; padding: 6px 14px; border-radius: 8px; display: flex; gap: 8px; font-size: 0.8rem; font-weight: bold; }

        .ai-chat-box { flex: 1; background: #090d16; border: 1px solid #312e81; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding-bottom: 5px; }
        .msg { font-size: 0.75rem; line-height: 1.4; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; }
        .msg.ai { background: #1e1b4b; border-right: 3px solid #6366f1; color: #cbd5e1; }
        .msg.user { background: #1e293b; border-left: 3px solid #ffb800; text-align: left; }

        .chat-input-area { display: flex; gap: 6px; }
        .chat-input-area input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #fff; padding: 0 10px; font-size: 0.8rem; outline: none; }
        .chat-input-area button { width: 40px; background: #4338ca; border: none; border-radius: 6px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }

        /* شاشات العرض الكبيرة (الكمبيوتر) */
        @media (min-width: 769px) {
            body { flex-direction: row; }
            .map-viewport { height: 100%; flex: 1; }
            .bottom-panel { width: 320px; height: 100%; border-top: none; border-right: 2px solid #1e293b; }
            .isometric-scene { transform: rotateX(55deg) rotateZ(-45deg) scale(0.75); }
        }
    </style>
</head>
<body>

    <div class="map-viewport" id="viewport">
        <div class="isometric-scene" id="scene">
            <div class="castle-node c-youtube" data-id="youtube">
                <div class="platform-badge"><i class="fab fa-youtube" style="color:#ef4444;"></i><span>يوتيوب</span></div>
                <div class="castle-neon-grid"></div>
                <div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div>
            </div>
            <div class="castle-node c-tiktok" data-id="tiktok">
                <div class="platform-badge"><i class="fab fa-tiktok" style="color:#06b6d4;"></i><span>تيك توك</span></div>
                <div class="castle-neon-grid"></div>
                <div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div>
            </div>
            <div class="castle-node c-insta" data-id="insta">
                <div class="platform-badge"><i class="fab fa-instagram" style="color:#ec4899;"></i><span>انستغرام</span></div>
                <div class="castle-neon-grid"></div>
                <div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div>
            </div>
            <div class="castle-node c-snap" data-id="snap">
                <div class="platform-badge"><i class="fab fa-snapchat" style="color:#eab308;"></i><span>سناب شات</span></div>
                <div class="castle-neon-grid"></div>
                <div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div>
            </div>
            <div class="castle-node c-facebook" data-id="facebook">
                <div class="platform-badge"><i class="fab fa-facebook-f" style="color:#3b82f6;"></i><span>فيسبوك</span></div>
                <div class="castle-neon-grid"></div>
                <div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div>
            </div>
            <div class="castle-node c-linkedin" data-id="linkedin">
                <div class="platform-badge"><i class="fab fa-linkedin-in" style="color:#0284c7;"></i><span>لينكد إن</span></div>
                <div class="castle-neon-grid"></div>
                <div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div>
            </div>
            <div class="castle-node c-upwork" data-id="upwork">
                <div class="platform-badge"><i class="fas fa-briefcase" style="color:#22c55e;"></i><span>أب ورك</span></div>
                <div class="castle-neon-grid"></div>
                <div class="castle-3d-structure"><div class="main-tower"><div class="castle-roof-top"></div></div></div>
            </div>
        </div>
    </div>

    <div class="bottom-panel">
        <div class="panel-header-row">
            <div class="sidebar-title"><i class="fas fa-crown"></i> منظومة الممالك السحابية</div>
            <div class="treasury-row"><span>الخزينة:</span><span style="color:#6fda44;">$5,680.00</span></div>
        </div>
        
        <div class="ai-chat-box">
            <div class="chat-messages" id="chatContainer">
                <div class="msg ai">🛠️ تم تحديث الواجهة والتطويرات بنجاح يا قائد! القلاع السبع مستقرة وجاهزة للسحب، ويتم مزامنتها مع Supabase تلقائياً بدون تداخل. (موضوع الـ AI مؤجل حالياً بناءً على طلبك).</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="اكتب رسالتك للمنظومة...">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // إعدادات الـ Supabase
        const SUPABASE_URL = "https://pujxqcfzljzxiijgfbtw.supabase.co";
        const SUPABASE_ANON_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1anhxY2Z6bGp6eGlpamdmYnR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NDI2OTksImV4cCI6MjA5ODMxODY5OX0.XPrxnm6PDfBFDDXmKInHVqwvUZ6Aa2vGxWW9peu4jKw";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // جلب الإحداثيات المحفوظة من السحاب
        async function loadPositions() {
            try {
                let { data } = await _supabase.from('castles').select('*');
                if (data) {
                    data.forEach(item => {
                        const el = document.querySelector(`[data-id="${item.castle_id}"]`);
                        if (el) {
                            el.style.left = item.left_position + '%';
                            el.style.top = item.top_position + '%';
                        }
                    });
                }
            } catch(e) { console.log("خطأ تحميل سحابي:", e); }
        }
        window.addEventListener('DOMContentLoaded', loadPositions);

        async function savePosition(id, top, left) {
            try {
                await _supabase.from('castles').upsert({ castle_id: id, top_position: top, left_position: left });
            } catch(e) { console.log("خطأ حفظ سحابي:", e); }
        }

        // ================= سكريبت سحب وإفلات تفاعلي متطور وموزون مائة بالمائة =================
        const nodes = document.querySelectorAll('.castle-node');
        nodes.forEach(node => {
            let active = false;
            let currentX, currentY, initialX, initialY;
            let xOffset = 0, yOffset = 0;

            node.addEventListener('touchstart', dragStart, {passive: false});
            window.addEventListener('touchend', dragEnd, {passive: false});
            window.addEventListener('touchmove', dragMove, {passive: false});

            node.addEventListener('mousedown', dragStart);
            window.addEventListener('mouseup', dragEnd);
            window.addEventListener('mousemove', dragMove);

            function dragStart(e) {
                const parentRect = node.parentElement.getBoundingClientRect();
                const nodeRect = node.getBoundingClientRect();
                
                xOffset = ((nodeRect.left - parentRect.left) / parentRect.width) * 100;
                yOffset = ((nodeRect.top - parentRect.top) / parentRect.height) * 100;

                if (e.type === 'touchstart') {
                    initialX = e.touches[0].clientX;
                    initialY = e.touches[0].clientY;
                } else {
                    initialX = e.clientX;
                    initialY = e.clientY;
                }
                if (e.target.closest('.castle-node')) active = true;
            }

            function dragMove(e) {
                if (!active) return;
                e.preventDefault();

                if (e.type === 'touchmove') {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }

                const parentRect = node.parentElement.getBoundingClientRect();
                
                // موازنة الحركة لتقليل انحراف المنظور الأيزومتري ثلاثي الأبعاد
                let newLeft = xOffset + (currentX / parentRect.width) * 130; 
                let newTop = yOffset + (currentY / parentRect.height) * 130;

                // وضع حدود صارمة لمنع خروج القلاع من الساحة
                if(newLeft < 1) newLeft = 1; if(newLeft > 88) newLeft = 88;
                if(newTop < 1) newTop = 1; if(newTop > 88) newTop = 88;

                node.style.left = newLeft + '%';
                node.style.top = newTop + '%';
            }

            function dragEnd() {
                if (!active) return;
                active = false;
                savePosition(node.getAttribute('data-id'), parseFloat(node.style.top), parseFloat(node.style.left));
            }
        });

        // تشغيل الشات التجريبي العادي حالياً
        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('userInput');
            const query = input.value.trim();
            if(!query) return;
            const container = document.getElementById('chatContainer');
            const uBox = document.createElement('div'); uBox.className = 'msg user'; uBox.innerText = query;
            container.appendChild(uBox); input.value = '';
            container.scrollTop = container.scrollHeight;
        });
    </script>
</body>
</html>
